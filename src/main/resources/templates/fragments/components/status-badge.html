<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <!--
        Fragmento reutilizable para badge de estado de solicitud.
        Uso:
        <th:block th:replace="~{fragments/components/status-badge :: badge(${request.status})}"></th:block>
    -->
    <span th:fragment="badge(status)"
          th:switch="${status.name()}"
          class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium rounded-full whitespace-nowrap"
          th:classappend="${status.name() == 'PENDING'    ? 'bg-yellow-100 text-yellow-800' :
                           status.name() == 'IN_PROGRESS' ? 'bg-indigo-100 text-indigo-800' :
                           status.name() == 'COMPLETED'   ? 'bg-green-100 text-green-800' :
                           status.name() == 'REJECTED'    ? 'bg-red-100 text-red-800' :
                                                            'bg-gray-100 text-gray-800'}">
        <span th:case="'PENDING'">Pendiente</span>
        <span th:case="'IN_PROGRESS'">En Proceso</span>
        <span th:case="'COMPLETED'">Completada</span>
        <span th:case="'REJECTED'">Rechazada</span>
        <span th:case="*" th:text="${status.displayName}">Estado</span>
    </span>

</body>
</html>
